<VirtualHost *:80>
    # Sirve la app desde /public (entrada de nuestro proyecto)
    DocumentRoot /var/www/html/public

    <Directory /var/www/html/public>
        #Permite override de configuración en .htaccess
        AllowOverride All
        Require all granted
    </Directory>
    # Logs de Apache para debug
    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>