services:
  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: crud_pdo_app
    ports:
      - "8085:80"  # Cambia el puerto si lo necesitas
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: crud_pdo
      DB_USER: crud_user
      DB_PASSWORD: crud_pass
      DB_CHARSET: utf8mb4
    volumes:
      - ./crud_pdo:/var/www/html/
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    container_name: crud_pdo_db
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: crud_pdo
      MYSQL_USER: crud_user
      MYSQL_PASSWORD: crud_pass
    volumes:
      - db_data:/var/lib/mysql
      - ./files/db.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  db_data:
